<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 24px 16px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
    }
    header {
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }
    header p {
      margin-top: 4px;
      font-size: 1rem;
      color: #555;
    }
    header p span {
      font-weight: 600;
      color: #222;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      color: #444;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: #555; }
    .cal-field { display: none; }
    .cal-field.visible { display: block; }
    .hint {
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .reset-btn {
      margin-top: 8px;
      background: transparent;
      color: #888;
      border: 1px solid #ddd;
      font-size: 0.82rem;
    }
    .reset-btn:hover { background: #f5f5f5; color: #c00; border-color: #c00; }
    .msg {
      margin-top: 12px;
      font-size: 0.875rem;
      color: #2a7a2a;
      min-height: 20px;
    }
    .msg.error { color: #c00; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    th {
      text-align: left;
      font-weight: 600;
      color: #888;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    td {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    td:last-child { text-align: right; color: #555; }
    .empty { color: #aaa; font-size: 0.875rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Calorie Tracker</h1>
    <p>Today: <span id="daily-total">0</span> kcal</p>
  </header>

  <div class="layout">
    <div>
      <div class="card">
        <h2>Log a Meal</h2>
        <label for="food-input">Food name</label>
        <input type="text" id="food-input" placeholder="e.g. rice" autocomplete="off">

        <label for="weight-input">Weight (g)</label>
        <input type="number" id="weight-input" placeholder="e.g. 200" min="0" step="any">

        <div class="cal-field" id="cal-field">
          <label for="cal-input">Calories per 100g</label>
          <input type="number" id="cal-input" placeholder="e.g. 130" min="0" step="any">
          <p class="hint">This food isn't in your database yet — enter its calorie density to save it.</p>
        </div>

        <button id="log-btn">Log Meal</button>
        <p class="msg" id="msg"></p>
      </div>

      <div class="card">
        <h2>Today's Log</h2>
        <div id="log-container"></div>
        <button class="reset-btn" id="reset-btn">Reset today's entries</button>
      </div>
    </div>

    <div class="card">
      <h2>Food Database</h2>
      <div id="db-container"></div>
    </div>
  </div>
</div>

<script>
  const DB_KEY  = 'calorie_food_db';
  const LOG_KEY = 'calorie_daily_log';

  // Seed existing food_database.json data on first load
  function initDb() {
    if (!localStorage.getItem(DB_KEY)) {
      saveFoodDb({ rice: 130.0 });
    }
  }

  function loadFoodDb() {
    return JSON.parse(localStorage.getItem(DB_KEY) || '{}');
  }

  function saveFoodDb(db) {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
  }

  function loadLog() {
    return JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
  }

  function saveLog(log) {
    localStorage.setItem(LOG_KEY, JSON.stringify(log));
  }

  function localDateTimeString(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function todayPrefix() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; // "YYYY-MM-DD"
  }

  function getTodayTotal() {
    const today = todayPrefix();
    return loadLog()
      .filter(e => e.timestamp.startsWith(today))
      .reduce((sum, e) => sum + e.calories, 0);
  }

  function logMeal(food, weight, calories) {
    const log = loadLog();
    log.push({
      timestamp: localDateTimeString(new Date()),
      food,
      weight,
      calories: Math.round(calories * 100) / 100
    });
    saveLog(log);
  }

  function renderTotal() {
    const total = Math.round(getTodayTotal() * 100) / 100;
    document.getElementById('daily-total').textContent = total;
  }

  function renderLog() {
    const today = todayPrefix();
    const entries = loadLog().filter(e => e.timestamp.startsWith(today));
    const container = document.getElementById('log-container');

    if (entries.length === 0) {
      container.innerHTML = '<p class="empty">No meals logged today.</p>';
      return;
    }

    const rows = entries.map(e => {
      const time = e.timestamp.slice(11, 16); // "HH:MM"
      return `<tr>
        <td>${time}</td>
        <td>${e.food}</td>
        <td>${e.weight}g</td>
        <td>${e.calories} kcal</td>
      </tr>`;
    }).join('');

    container.innerHTML = `<table>
      <thead><tr><th>Time</th><th>Food</th><th>Weight</th><th>Calories</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderFoodDb() {
    const db = loadFoodDb();
    const container = document.getElementById('db-container');
    const entries = Object.entries(db).sort((a, b) => a[0].localeCompare(b[0]));

    if (entries.length === 0) {
      container.innerHTML = '<p class="empty">No foods saved yet.</p>';
      return;
    }

    const rows = entries.map(([food, cals]) =>
      `<tr><td>${food}</td><td>${cals} kcal</td></tr>`
    ).join('');

    container.innerHTML = `<table>
      <thead><tr><th>Food</th><th>Per 100g</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function setMsg(text, isError = false) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (isError ? ' error' : '');
  }

  // Show/hide cal/100g field based on whether food is in DB
  document.getElementById('food-input').addEventListener('change', function () {
    const food = this.value.trim().toLowerCase();
    const db = loadFoodDb();
    const calField = document.getElementById('cal-field');
    if (food && !(food in db)) {
      calField.classList.add('visible');
    } else {
      calField.classList.remove('visible');
      document.getElementById('cal-input').value = '';
    }
    setMsg('');
  });

  document.getElementById('log-btn').addEventListener('click', function () {
    const food   = document.getElementById('food-input').value.trim().toLowerCase();
    const weight = parseFloat(document.getElementById('weight-input').value);
    const calInput = document.getElementById('cal-input').value;

    if (!food) { setMsg('Enter a food name.', true); return; }
    if (isNaN(weight) || weight <= 0) { setMsg('Enter a valid weight.', true); return; }

    const db = loadFoodDb();
    let cals100g;

    if (food in db) {
      cals100g = db[food];
    } else {
      cals100g = parseFloat(calInput);
      if (isNaN(cals100g) || cals100g < 0) {
        setMsg('Enter calories per 100g for this new food.', true);
        return;
      }
      db[food] = cals100g;
      saveFoodDb(db);
    }

    const calories = weight * (cals100g / 100);
    logMeal(food, weight, calories);

    setMsg(`Added ${weight}g of ${food} — ${Math.round(calories * 100) / 100} kcal`);
    document.getElementById('food-input').value = '';
    document.getElementById('weight-input').value = '';
    document.getElementById('cal-input').value = '';
    document.getElementById('cal-field').classList.remove('visible');

    renderTotal();
    renderLog();
    renderFoodDb();
  });

  document.getElementById('reset-btn').addEventListener('click', function () {
    if (!confirm('Remove all of today\'s entries?')) return;
    const today = todayPrefix();
    const kept = loadLog().filter(e => !e.timestamp.startsWith(today));
    saveLog(kept);
    setMsg('');
    renderTotal();
    renderLog();
  });

  // Init
  initDb();
  renderTotal();
  renderLog();
  renderFoodDb();
</script>
</body>
</html>
